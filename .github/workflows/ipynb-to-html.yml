# This is a basic workflow to help you get started with Actions

name: Convert ipynb files to html

# Controls when the action will run. 
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    permissions:
      contents: write
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Install nbconvert
        run: pip install nbconvert
  
      - name: Convert all ipynb files to html (and delete ipynb files)
        run: find . -name '*.ipynb' -type f -execdir jupyter nbconvert --template classic --to html {} \; -execdir rm {} \;

      - name: Push notebooks folder to the build branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan build-temp
          git rm -rf .
          cp -r notebook/* .
          git add .
          git commit -m "Build: Convert ipynb to html" --allow-empty || true
          git push origin HEAD:build --force
          git checkout main
          